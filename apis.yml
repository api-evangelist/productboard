created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: productboard:public-api
    name: Productboard Public API
    description: >-
      REST API for managing features, components, products, notes (customer
      feedback), users, companies, objectives, releases, and webhooks within
      Productboard. Supports both v1 and v2 endpoints. Authentication uses
      Bearer tokens (Public API Access token) or OAuth2 for multi-tenant
      integrations.
    humanURL: https://developer.productboard.com/
    baseURL: https://api.productboard.com
    tags:
      - Product Management
      - Roadmapping
      - Customer Feedback
      - REST
    properties:
