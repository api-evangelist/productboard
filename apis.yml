aid: productboard
name: Productboard
description: >-
  Productboard is a product management platform that helps product teams
  capture user feedback, prioritize features, build product roadmaps, and
  align engineering, design, and go-to-market stakeholders around what to
  build next. The Productboard Public REST API (v1 and v2) provides
  programmatic access to features, components, products, notes, users,
  companies, objectives, releases, and webhooks at https://api.productboard.com,
  with authentication via a Public API Access token (Bearer) or OAuth2.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Product Management
  - Roadmapping
  - Customer Feedback
  - Prioritization
  - Product Operations
url: >-
